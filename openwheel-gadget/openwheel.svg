<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="58" fill="#1a1a1a" stroke="#ffffff" stroke-width="4"/>
  <!-- Inner dial body -->
  <circle cx="64" cy="64" r="40" fill="#2d2d2d"/>
  <!-- Tick marks -->
  <g stroke="#555555" stroke-width="2" stroke-linecap="round">
    <line x1="64" y1="10" x2="64" y2="20"/>
    <line x1="64" y1="108" x2="64" y2="118"/>
    <line x1="10" y1="64" x2="20" y2="64"/>
    <line x1="108" y1="64" x2="118" y2="64"/>
    <line x1="22.3" y1="22.3" x2="29.4" y2="29.4"/>
    <line x1="105.7" y1="22.3" x2="98.6" y2="29.4"/>
    <line x1="22.3" y1="105.7" x2="29.4" y2="98.6"/>
    <line x1="105.7" y1="105.7" x2="98.6" y2="98.6"/>
  </g>
  <!-- Position indicator line (pointing to ~11 o'clock) -->
  <line x1="64" y1="64" x2="41" y2="30" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="64" cy="64" r="6" fill="#ffffff"/>
</svg>
