name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary target: GNOME/Wayland, no KDE Frameworks
          - name: "GNOME (no KF6)"
            kde: false

          # Secondary target: KDE Plasma — optional KF6 features enabled
          - name: "KDE (with KF6)"
            kde: true

    steps:
      - uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential pkg-config \
            libdbus-1-dev \
            qt6-base-dev qt6-declarative-dev \
            libqt6opengl6-dev \
            libx11-dev libxtst-dev

      - name: Install KDE Frameworks 6 dependencies
        if: matrix.kde
        run: |
          sudo apt-get install -y --no-install-recommends \
            extra-cmake-modules \
            libkf6coreaddons-dev \
            libkf6dbusaddons-dev \
            libkf6i18n-dev

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DAEMON=ON \
            -DBUILD_GADGET=ON \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Verify no KF6 symbols in GNOME build
        if: "!matrix.kde"
        run: |
          # Confirm the gadget binary was NOT linked against KF6 libraries
          if ldd build/bin/openwheel-gadget 2>/dev/null | grep -qi "KF6\|libKF6"; then
            echo "ERROR: KF6 libraries found in GNOME build!" && exit 1
          fi
          echo "OK: no KF6 libraries in GNOME build"
